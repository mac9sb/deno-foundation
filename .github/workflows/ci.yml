name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check src/ tests/

      - name: Lint
        run: deno lint src/ tests/

      - name: Type check
        run: deno check src/mod.ts

      - name: Test
        run: deno task test
